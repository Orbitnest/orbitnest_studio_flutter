name: orbitnest_studio_flutter
description: Secure Flutter client for OrbitNest Studio - Supabase-compatible backend as a service with enterprise security
version: 1.2.0
homepage: https://orbitnest.studio


environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Networking
  dio: ^5.4.0
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Storage & Persistence
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Utilities
  crypto: ^3.0.3
  uuid: ^4.2.1
  jwt_decoder: ^2.0.1
  collection: ^1.18.0
  meta: ^1.10.0
  flutter_dotenv: ^5.1.0
  
  
  # Reactive programming
  rxdart: ^0.27.7

  # Realtime — WebSocket transport
  web_socket_channel: ^3.0.1

  # Passkey / WebAuthn (Credential Manager on Android, ASAuthorization on iOS)
  passkeys: ^2.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Testing
  bloc_test: ^9.1.5
  mockito: ^5.4.4
  mocktail: ^1.0.2
  
  
  # Linting
  flutter_lints: ^3.0.1

